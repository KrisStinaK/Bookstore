{% extends "_base.html" %}
{% load static %}
{% block title %}Books{% endblock title %}
{% block content %}


    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .book-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        .book {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            width: 220px;
            margin: 10px;
            padding: 15px;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .book:hover {
            transform: scale(1.05);
        }
        .book img {
            width: 150px;
            height: auto;
            border-radius: 4px;
        }
        .book-title {
            font-weight: bold;
            margin-top: 10px;
            font-size: 1.1em;
            text-align: center;
        }
        .book-author {
            color: #555;
            margin-top: 5px;
            text-align: center;
        }
        .book-price {
            color: #27ae60;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
    <h1>Наши книги</h1>
    <div class="book-list">
        {% for book in book_list %}
        <div class="book">
            <img src="{{book.cover.url}}" />
            <div>
                <h5><a href="{{ book.get_absolute_url }}">{{ book.title }}</a></h5>
            </div>
            <div class="book-author">{{ book.author }}</div>
            <div class="book-price">{{ book.price }}</div>
        </div>
        {% endfor %}
        
    </div>
{% endblock content %}
